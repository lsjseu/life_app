# Life App script configuration.
# Keep this file as simple KEY=VALUE settings.
# Values can still be overridden when running scripts, for example:
# BACKEND_PORT=8010 LOG_DIR=/deploy/life_app/log bash scripts/deploy_linux.sh

APP_NAME=life_app

# Common runtime settings
BACKEND_PORT=8000
PYTHON_BIN=python3
FORCE_INSTALL=0
STARTUP_TIMEOUT=60
MYSQL_PROVISION=1

# General Agent / LLM settings
# Keep API keys empty in source control. Fill it in locally or pass it as an
# environment variable when running scripts.
GENERAL_AGENT_PROVIDER=deepseek
GENERAL_AGENT_MODEL=deepseek-chat
DEEP_THINK_LLM=deepseek-reasoner
QUICK_THINK_LLM=deepseek-chat
LLM_PROVIDER=deepseek
LLM_BACKEND_URL=https://api.deepseek.com/v1
LLM_API_KEY=

# Database settings. Defaults follow SmartTrader's database account style.
DB_TYPE=mysql
DB_HOST=127.0.0.1
DB_PORT=3306
DB_USER=admin
DB_PASSWORD=admin
DB_NAME=life_app
DB_CHARSET=utf8mb4

# Service settings
BACKEND_HOST=0.0.0.0

# Linux deployment defaults
LINUX_BACKEND_HOST=0.0.0.0
LINUX_USE_SQLITE=0
LINUX_LOG_DIR=

# Optional overrides. Leave empty to use script defaults.
APP_DIR=
INSTALL_DIR=
RUNTIME_DIR=
LOG_DIR=
PID_DIR=
SERVICE_USER=
MYSQL_ADMIN_HOST=
MYSQL_ADMIN_PORT=
MYSQL_ADMIN_USER=
MYSQL_ADMIN_PASSWORD=
